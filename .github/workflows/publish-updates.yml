name: Publish translation update site

on:
  workflow_dispatch:
    inputs:
      release:
        description: Translation release name, for example 2.9.0-beta-2-multilang-build1
        required: false
      pack_version:
        description: Compatible GTNH version, for example 2.9.0-beta-2
        required: false
      source_repository:
        description: Translation source repository
        required: true
        default: GTNewHorizons/GTNH-Translations
      source_ref:
        description: Translation source branch, tag, or commit
        required: true
        default: master
  schedule:
    # 每天在官方 GTNH-Translations 同步完成后刷新。
    - cron: '30 19 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout updater
        uses: actions/checkout@v5
      - name: Checkout translation source
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.source_repository || 'GTNewHorizons/GTNH-Translations' }}
          ref: ${{ inputs.source_ref || 'master' }}
          path: translation-source
      - name: Checkout GTNH version marker
        uses: actions/checkout@v5
        with:
          repository: GTNewHorizons/GT-New-Horizons-Modpack
          ref: master
          path: gtnh-modpack
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_SHA=$(git -C translation-source rev-parse --short=12 HEAD)
          PACK_VERSION='${{ inputs.pack_version }}'
          if [[ -z "$PACK_VERSION" ]]; then
            PACK_VERSION=$(sed -nE 's/^GTNH ([^ ]+) .*/\1/p' gtnh-modpack/config/txloader/load/mainmenu/version.txt | head -n 1)
          fi
          if [[ -z "$PACK_VERSION" ]]; then
            echo 'Could not determine GTNH version from the official modpack; use pack_version.' >&2
            exit 1
          fi
          RELEASE='${{ inputs.release }}'
          if [[ -z "$RELEASE" ]]; then
            RELEASE="${PACK_VERSION}-multilang-${SOURCE_SHA}"
          fi
          echo "pack_version=$PACK_VERSION" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
      - name: Build hash-verified update payloads
        run: >-
          python tools/build_update.py
          --source translation-source
          --output site
          --release "${{ steps.metadata.outputs.release }}"
          --pack-version "${{ steps.metadata.outputs.pack_version }}"
          --base-url "${{ steps.pages.outputs.base_url }}"
          --existing-site-url "${{ steps.pages.outputs.base_url }}"
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
